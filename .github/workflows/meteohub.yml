name: MeteoHub (pilota)
on:
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Data da raccogliere (YYYY-MM-DD, lascia vuoto per ieri+altroieri)'
        required: false
        default: ''
  schedule:
    # Ogni run raccoglie ieri + altroieri + auto-riparazione fino a 7gg.
    # Orari sfalsati rispetto a ticino.yml (xx:30) per ridurre i conflitti
    # di push tra workflow concorrenti.
    - cron: '50 1 * * *'
    - cron: '50 5 * * *'
    - cron: '50 11 * * *'
    - cron: '50 17 * * *'
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Raccoglie dati MeteoHub
        id: collect
        run: node .github/scripts/collect-meteohub.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
        continue-on-error: true
      - name: Retry 1
        if: steps.collect.outcome == 'failure'
        run: sleep 30 && node .github/scripts/collect-meteohub.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
        continue-on-error: true
      - name: Retry 2
        if: steps.collect.outcome == 'failure'
        run: sleep 60 && node .github/scripts/collect-meteohub.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
      - name: Commit e push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          mkdir -p data/meteohub-lombardia data/meteohub-marche data/meteohub-umbria
          git add data/meteohub-lombardia/ data/meteohub-marche/ data/meteohub-umbria/
          git diff --staged --quiet || git commit -m "meteohub $(date -u +%Y-%m-%d)"
          ok=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then ok=1; break; fi
            echo "Push fallito (tentativo $i/5), retry tra 10s..."
            sleep 10
          done
          [ "$ok" = "1" ] || { echo "Push fallito dopo 5 tentativi"; exit 1; }
