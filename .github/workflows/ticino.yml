name: Ticino
on:
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Data da raccogliere (YYYY-MM-DD, lascia vuoto per ieri+altroieri)'
        required: false
        default: ''
  schedule:
    # Ogni run raccoglie ieri + altroieri. Il totale giornaliero OASI viene
    # pubblicato solo a metà mattina (~08:30 CEST): il run notturno (00:30 UTC)
    # e quello delle 04:30 usano il fallback a somma 10-min del collector, i
    # run successivi consolidano col valore ufficiale.
    - cron: '30 0 * * *'
    - cron: '30 4 * * *'
    - cron: '30 10 * * *'
    - cron: '30 16 * * *'
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Raccoglie dati Ticino
        id: collect
        run: node .github/scripts/collect-ticino-gh.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
        continue-on-error: true
      - name: Retry 1
        if: steps.collect.outcome == 'failure'
        run: sleep 30 && node .github/scripts/collect-ticino-gh.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
        continue-on-error: true
      - name: Retry 2
        if: steps.collect.outcome == 'failure'
        run: sleep 60 && node .github/scripts/collect-ticino-gh.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
      - name: Commit e push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          mkdir -p data/ticino
          git add data/ticino/
          git diff --staged --quiet || git commit -m "ticino $(date -u +%Y-%m-%d)"
          ok=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then ok=1; break; fi
            echo "Push fallito (tentativo $i/5), retry tra 10s..."
            sleep 10
          done
          [ "$ok" = "1" ] || { echo "Push fallito dopo 5 tentativi"; exit 1; }
