name: Alto Adige
on:
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Data da raccogliere (YYYY-MM-DD, lascia vuoto per oggi)'
        required: false
        default: ''
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 5 * * *'
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
    - cron: '0 17 * * *'
    - cron: '0 21 * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Raccoglie dati Alto Adige
        run: node .github/scripts/collect-altoadige-gh.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
      - name: Commit e push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          mkdir -p data/altoadige
          git add data/altoadige/
          git diff --staged --quiet || git commit -m "altoadige $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
